<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Snippet</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

<h2>Add Snippet</h2>

<div class="navbar">
    <div>CodeVault</div>
    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/snippets" class="active">Snippets</a>
        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="container">
<h2>Add New Snippet</h2>

<form th:action="@{/snippets/save}" method="post" th:object="${snippet}" class="form-box">

    <div class="input-group">
        <input type="text" th:field="*{title}" required>
        <label>Title</label>
    </div>
    <div class="input-group">
        <input type="text" th:field="*{language}" required>
        <label>Language</label>
    </div>
    <div class="input-group">
        <textarea th:field="*{code}" required></textarea>
        <label>Code</label>
    </div>
    <button type="submit">Save</button>


    <!-- <input type="hidden" th:field="*{id}">
    <input type="text" th:field="*{title}" placeholder="Title">
    <input type="text" th:field="*{language}" placeholder="Language">
    <textarea th:field="*{code}" placeholder="Code"></textarea>
    <button type="submit">Save</button> -->
</form>
</div>

<link rel="stylesheet" href="/css/style.css">
<script src="/js/script.js"></script>

</body>
</html>
