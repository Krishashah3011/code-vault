<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="navbar">
    <div>CodeVault</div>
    <div>
        <button onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="auth-container">
    <div class="auth-card">

        <h2>Create Account 🚀</h2>
        <p class="auth-subtitle">
            Start saving and organizing your code snippets today
        </p>

        <p class="error-msg" th:if="${error}" th:text="${error}"></p>
        <p class="success-msg" th:if="${success}" th:text="${success}"></p>

        <form th:action="@{/register}" method="post" th:object="${user}">
            <input type="text" th:field="*{username}" placeholder="Username" required>
            <!-- <div class="input-group">
            <input type="text" required>
            <label>Username</label>
            </div> -->
            <input type="email" th:field="*{email}" placeholder="Email" required>
            <input type="password" th:field="*{password}" placeholder="Password" required>
            <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
            <button type="submit">Register</button>
        </form>
        <a href="/login" class="auth-link">
            Already have an account? Login
        </a>
    </div>
</div>
<script src="/js/script.js"></script>
</body>
</html>
